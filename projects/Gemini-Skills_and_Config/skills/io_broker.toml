name = "unified_io_broker"
description = "Handles all file I/O between the native Termux ext4 environment and Android FUSE shared storage. Use this to bypass permission denied errors. Valid targets: source, media, data."
command = "/data/data/com.termux/files/usr/bin/fish /data/data/com.termux/files/home/shadow_workspace/unified_io_broker.fish"

[[args]]
name = "action"
description = "The sync direction: pull (to shadow workspace), push (to shared storage), or archive (backup workspace)."
required = true

[[args]]
name = "target"
description = "The directory to target: source, media, or data."
required = false
