description = "Create or update README.md for the analyzed Java project using guidelines or defaults."
prompt = """
Goal: Create or update README.md for the analyzed Java project. The README must describe the project itself, not this extension.

Guideline resolution:
- If README.guidelines.md exists in the repository root, read it directly and follow its structure and rules.
- If README.guidelines.md is absent, use the default structure (in English, technical, concise, neutral):
  1) Project Overview
  2) Tech Stack
  3) Build & Run
  4) Project Structure (high-level)
  5) Configuration
  6) Limitations / Notes (optional)
- Safety rules (always): no badges/images/promo links; English only; prefer TODO markers over guesses; do not invent APIs or runtime behavior.

Project analysis (use only direct file reads, no extra helper scripts):
- Identify build tool and Java version by reading pom.xml or build.gradle(.kts). If both exist, prefer Maven.
- Detect frameworks (e.g., Spring Boot, Quarkus) from build files and config (application.properties/yml).
- Detect API contracts (OpenAPI/Swagger) and list them in Tech Stack or Configuration.
- Map modules/subprojects if present; list main entry classes when obvious.
- Keep findings factual; if uncertain, say TODO.

README management:
- AI-managed content must live inside the stable markers: <!-- AI:START --> ... <!-- AI:END -->.
- If README.md does not exist: create it with the guideline sections and insert AI-managed blocks where autogenerated content belongs.
- If README.md exists:
  - Preserve all manual content verbatim.
  - Only create or update content inside AI-managed markers.
  - If markers are missing in a guideline-driven section, insert a single AI-managed block for that section.
- Do NOT reorder or rewrite user-authored text outside markers.
- Keep output deterministic and idempotent: reruns with no project changes must not alter the file.

Minimal validation (run after writing):
!{bash -lc 'if [ -s README.md ] && grep -q \"<!-- AI:START -->\" README.md && grep -q \"<!-- AI:END -->\" README.md && sed -n \"/<!-- AI:START -->/,/<!-- AI:END -->/p\" README.md | grep -qi \"[a-z]\"; then echo \"README validation: pass\"; else echo \"README validation: FAIL (missing file/markers/content)\"; fi'}

Available project signals:
!{ls}
!{find . -maxdepth 2 -name 'README.guidelines.md' -o -name 'pom.xml' -o -name 'build.gradle' -o -name 'build.gradle.kts' -o -name 'settings.gradle' -o -name 'settings.gradle.kts' 2>/dev/null}
!{find . -maxdepth 3 -name 'openapi.yaml' -o -name 'openapi.yml' -o -name 'openapi.json' -o -name 'swagger.yaml' -o -name 'swagger.yml' -o -name 'swagger.json' 2>/dev/null}
!{find . -maxdepth 3 -name 'application.properties' -o -name 'application.yml' -o -name 'application.yaml' 2>/dev/null}
!{head -n 200 pom.xml 2>/dev/null || true}
!{head -n 200 build.gradle 2>/dev/null || true}
!{head -n 200 build.gradle.kts 2>/dev/null || true}

Return the updated README.md content only.
"""
[system]
from_file = "../GEMINI.md"
