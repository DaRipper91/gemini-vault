prompt = """
# Rule: Generating a Task List from a PRD

## Goal
To guide an AI assistant in creating a detailed, step-by-step task list in Markdown format based on an existing Product Requirements Document: {{args}}. The task list should guide a developer through implementation.

## Output
- **Format:** Markdown (.md)
- **Location:** `/tasks/`
- **Filename:** `tasks-[prd-file-name].md` (e.g., `tasks-0001-prd-user-profile-editing.md`)

## Process
1. **Verify Directory Setup:** Ensure the `/tasks` directory exists. If it doesn't, create it automatically.
2. **Validate PRD File:** Check that the specified PRD file: {{args}} exists and is readable. If not found, list available PRDs in `/tasks` directory and ask for clarification.
3. **Analyze PRD:** Read and analyze the functional requirements, user stories, and other sections of the specified PRD.
4. **Assess Current State:** Review the existing codebase to understand existing infrastructure, architectural patterns and conventions. Also, identify any existing components or features that already exist and could be relevant to the PRD requirements. Then, identify existing related files, components, and utilities that can be leveraged or need modification.
5. **Check for Existing Task List:** Verify that a task list for this PRD doesn't already exist. If it does, ask if user wants to overwrite or modify the existing one.
6. **Phase 1: Generate Parent Tasks:** Based on the PRD analysis and current state assessment, create the main, high-level tasks required to implement the feature. Use your judgement on how many high-level tasks to use. It's likely to be about five tasks. Present these tasks to the user in the specified format (without sub-tasks yet). Inform the user: "I have generated the high-level tasks based on the PRD. Ready to generate the sub-tasks? Respond with 'Go' to proceed."
7. **Wait for Confirmation:** Pause and wait for the user to respond with "Go".
8. **Phase 2: Generate Sub-Tasks:** Once the user confirms, break down each parent task into smaller, actionable sub-tasks necessary to complete the parent task. Ensure sub-tasks logically follow from the parent task, cover the implementation details implied by the PRD, and consider existing codebase patterns where relevant without being constrained by them.
9. **Identify Relevant Files:** Based on the tasks and PRD, identify potential files that will need to be created or modified. List these under the `Relevant Files` section, including corresponding test files if applicable.
10. **Generate Final Output:** Combine the parent tasks, sub-tasks, relevant files, and notes into the final Markdown structure.
11. **Save Task List:** Save the generated document in the `/tasks/` directory with the filename `tasks-[prd-file-name].md`, where `[prd-file-name]` matches the base name of the input PRD file (e.g., if the input was `0001-prd-user-profile-editing.md`, the output is `tasks-0001-prd-user-profile-editing.md`).

## Output Format
The generated task list must follow this structure:

## Relevant Files
- `path/to/potential/file1.ts` - Brief description of why this file is relevant (e.g., Contains the main component for this feature).
- `path/to/file1.test.ts` - Unit tests for `file1.ts`.
- `path/to/another/file.tsx` - Brief description (e.g., API route handler for data submission).
- `path/to/another/file.test.tsx` - Unit tests for `another/file.tsx`.
- `lib/utils/helpers.ts` - Brief description (e.g., Utility functions needed for calculations).
- `lib/utils/helpers.test.ts` - Unit tests for `helpers.ts`.

### Notes
- Unit tests should typically be placed alongside the code files they are testing (e.g., `MyComponent.tsx` and `MyComponent.test.tsx` in the same directory).
- Use `npx jest [optional/path/to/test/file]` to run tests. Running without a path executes all tests found by the Jest configuration.

## Tasks
- [ ] 1.0 Parent Task Title
  - [ ] 1.1 [Sub-task description 1.1]
  - [ ] 1.2 [Sub-task description 1.2]
- [ ] 2.0 Parent Task Title
  - [ ] 2.1 [Sub-task description 2.1]
- [ ] 3.0 Parent Task Title (may not require sub-tasks if purely structural or configuration)

## Interaction Model
The process explicitly requires a pause after generating parent tasks to get user confirmation ("Go") before proceeding to generate the detailed sub-tasks. This ensures the high-level plan aligns with user expectations before diving into details.

## Target Audience
Assume the primary reader of the task list is a junior developer who will implement the feature with awareness of the existing codebase context.

## Error Handling
- If the PRD file cannot be found or read, list available PRDs and provide guidance
- If the task list file already exists, ask for confirmation before overwriting
- If file write operations fail, provide specific error messages with suggested solutions
- Always verify the task list file was successfully created before concluding
- Handle cases where the PRD format is invalid or incomplete

## File Validation
- Ensure PRD filename follows the pattern `[n]-prd-[feature-name].md`
- Validate that the PRD contains required sections (Goals, User Stories, Functional Requirements)
- Check that the proposed task list filename doesn't conflict with existing files
- Verify directory permissions before attempting file operations
"""
