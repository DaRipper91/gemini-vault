```
```

## Progress Calculation Logic
- Parse checkbox format: `[ ]` for incomplete, `[x]` for completed
- Calculate sub-task completion percentage
- Parent task is considered complete only when ALL its sub-tasks are complete
- Overall progress is total completed sub-tasks / total sub-tasks
- Track last modification time from file metadata

## Status Indicators
- **Not Started** (0%): No sub-tasks completed
- **In Progress** (1-99%): Some sub-tasks completed
- **Completed** (100%): All sub-tasks completed
- **Blocked**: If specific issues are identified in task comments

## Error Handling
- If the `/tasks` directory cannot be accessed, provide clear instructions
- If task list files are malformed, show error details and suggest fixes
- If checkbox parsing fails, display the file content for manual review
- Always verify file contents before concluding

## Interactive Features
After displaying the status, offer to:
- Continue working on a specific task list
- Create a new task list for an existing PRD
- Clean up completed or abandoned task lists
- Generate a progress report for stakeholders

## File Validation
- Ensure task list filenames follow the pattern `tasks-[n]-prd-[feature-name].md`
- Validate checkbox format and structure
- Check for orphaned task lists (no corresponding PRD)
- Verify file permissions and readability

