prompt = """
# List Task Lists and Progress

## Goal
To display all available task lists in the `/tasks` directory, showing completion progress and helping users understand their current development status.

## Process
1. **Verify Directory Setup:** Check that the `/tasks` directory exists. If it doesn't, create it automatically.
2. **Scan for Task Lists:** Look for files matching the pattern `tasks-[n]-prd-[feature-name].md` in the `/tasks` directory.
3. **Analyze Progress:** For each task list, parse the checkbox status to determine:
   - Total number of parent tasks
   - Total number of sub-tasks
   - Number of completed sub-tasks
   - Number of completed parent tasks
   - Overall completion percentage
4. **Display Results:** Present a formatted status report showing progress for each active feature.

## Output Format

If task lists are found:
